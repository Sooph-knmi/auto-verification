workdir: /leonardo_work/DestE_330_25/users/sbuurman/inference/tmp #Used to store temporary files for verif output

dataloader:
  predict: ${dataset}
  datamodule:
    _target_: bris.data.dataset.NativeGridDataset
    _convert_: all


# Optional dataloader settings
#  prefetch_factor: 2 
num_workers: 1

hardware:
  paths:
    output: ${output}
    workdir: ${workdir}
    data: /leonardo_work/DestE_330_25/anemoi/datasets/
    graph: /leonardo_work/DestE_340_26/users/sbuurman/graphs/hectometric/res7_10_validation/
  files:
    dataset: ERA5/aifs-od-an-oper-0001-mars-n320-2019-2023-6h-v6.zarr
    # dataset: ERA5/aifs-od-an-oper-0001-mars-o96-2016-2023-6h-v6.zarr
    dataset_lam: UWC_WEST/uwcwest-rr-an-oper-0001-mars-2p0km-2020-2023-6h-v2-knmi.zarr
  num_gpus_per_node: 4
  num_gpus_per_model: 4
  num_nodes: ${oc.decode:${oc.env:SLURM_NNODES}}
  graph_label: null
  num_members: 10

# If the user wants to release GPU cache and memory
# This option releases unused cached/memory used by torch
release_cache: False

model:
  _target_: bris.model.BrisPredictor
  _convert_: all

output: null #Not a required field, used in output path in routing

