          "tcc": {"scale": 0.01, "offset": 0}, 
          "hcc": {"scale": 0.01, "offset": 0}, 
          "mcc": {"scale": 0.01, "offset": 0}, 
          "lcc": {"scale": 0.01, "offset": 0},
